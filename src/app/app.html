<div class="min-vh-100 d-flex flex-column bg-light">
  
  @if (authService.isAuthenticated()) {
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3 mb-4">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-bold text-uppercase tracking-wider" routerLink="/dashboard">
          <i class="bi bi-cpu-fill me-2 text-warning"></i>
          Machine Bookings
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">
          <div class="text-light small d-none d-sm-block bg-secondary bg-opacity-25 px-3 py-1 rounded-pill border border-secondary">
            <i class="bi bi-person-circle me-2 text-info"></i>
            {{ authService.currentUser()?.email }}
          </div>

          <button (click)="onLogout()" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2 px-3">
            <i class="bi bi-box-arrow-right"></i>
            <span>Sign Out</span>
          </button>
        </div>
      </div>
    </nav>
  }

  <main class="flex-grow-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-white border-top py-3 mt-auto">
    <div class="container text-center text-muted small">
      &copy; 2026 Internal Machine Resource Ledger. Cloud-backed by Supabase.
    </div>
  </footer>

</div>
